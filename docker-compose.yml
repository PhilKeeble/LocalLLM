services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - ingress
      - llm_internal
    depends_on:
      - llm

  llm:
    image: ${LLAMA_IMAGE:-local/beellama-cuda-server:latest}
    build:
      context: ${BEELLAMA_REPO:-https://github.com/Anbeeld/beellama.cpp.git}
      dockerfile: .devops/cuda.Dockerfile
      target: server
      args:
        UBUNTU_VERSION: ${UBUNTU_VERSION:-24.04}
        CUDA_VERSION: ${CUDA_VERSION:-13.3.0}
        CUDA_DOCKER_ARCH: ${CUDA_DOCKER_ARCH:-default}
        CUDA_BUILD_TARGET: llama-server
    restart: unless-stopped
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --models-preset
      - /models/models.ini
      - --models-max
      - "1"
    gpus: all
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    expose:
      - "8080"
    shm_size: ${LLM_SHM_SIZE:-16gb}
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - ./models:/models:ro
    networks:
      - llm_internal

networks:
  ingress:
  llm_internal:
    internal: true

version = 1

[*]
n-gpu-layers = all
parallel = 1
kv-unified = true
batch-size = 2048
ubatch-size = 512
flash-attn = on
jinja = true
no-mmap = true
mlock = true
no-host = true
load-on-startup = false
stop-timeout = 30
sleep-idle-seconds = 900

[qwen-uncensored]
model = /models/Qwen3.6-27B-NEO-CODE-HERE-2T-OT-Q5_K_S.gguf
model-draft = /models/Qwen3.6-27B-DFlash-Q4_K_M.gguf
spec-type = dflash
spec-dflash-cross-ctx = 1024
spec-draft-ngl = all
ctx-size = 128000
cache-type-k = q5_0
cache-type-v = q4_1
reasoning = on
chat-template-kwargs = {"preserve_thinking":true}
temp = 0.6
top-k = 20
top-p = 1.0
min-p = 0.0

[qwen-code]
model = /models/Qwen3.6-27B-Q5_K_S.gguf
model-draft = /models/Qwen3.6-27B-DFlash-Q4_K_M.gguf
spec-type = dflash
spec-dflash-cross-ctx = 1024
spec-draft-ngl = all
ctx-size = 128000
cache-type-k = q5_0
cache-type-v = q4_1
reasoning = on
chat-template-kwargs = {"preserve_thinking":true}
temp = 0.6
top-k = 20
top-p = 1.0
min-p = 0.0

[gemma]
model = /models/gemma-4-26B-A4B-it-UD-Q4_K_S.gguf
model-draft = /models/gemma4-26b-a4b-it-dflash-Q4_K_M.gguf
spec-type = dflash
spec-dflash-cross-ctx = 1024
spec-draft-ngl = all
ctx-size = 65536
cache-type-k = q5_0
cache-type-v = q4_1
reasoning = on
temp = 1.0
top-k = 64
top-p = 0.95
min-p = 0.0
